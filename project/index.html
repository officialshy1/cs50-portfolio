<!DOCTYPE html>
<html>
<head>
    <title>Typing Speed Test</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Typing Speed Test</h1>
        <p>Type the following sentence as fast as you can:</p>
        <p id="sentence">The quick brown fox jumps over the lazy dog.</p>
        <button onclick="startTest()">Start Test</button>
        <textarea id="userTypedSentence" placeholder="Type the sentence here"></textarea>
        <button onclick="endTest()">End Test</button>
        <p id="result"></p>
    </div>

    <script>
        let startTime, endTime;

        function startTest() {
            startTime = new Date().getTime();
            document.getElementById('userTypedSentence').disabled = false;
            document.getElementById('userTypedSentence').focus();
        }

        function endTest() {
            endTime = new Date().getTime();
            document.getElementById('userTypedSentence').disabled = true;
            calculateResult();
        }

        function calculateResult() {
            const sentence = "The quick brown fox jumps over the lazy dog.";
            const userTypedSentence = document.getElementById('userTypedSentence').value.trim();
            const timeElapsedMillis = endTime - startTime;

            const wordsTyped = userTypedSentence.split(/\s+/).length;
            const charactersTyped = userTypedSentence.length;

            const wordsPerMinute = (wordsTyped / (timeElapsedMillis / 1000)) * 60;
            const accuracy = calculateAccuracy(sentence, userTypedSentence);

            document.getElementById('result').innerHTML = `
                Time taken: ${timeElapsedMillis} milliseconds<br>
                Words per minute: ${wordsPerMinute}<br>
                Accuracy: ${accuracy}%
            `;
        }

        function calculateAccuracy(original, typed) {
            let correctCharacters = 0;

            for (let i = 0; i < Math.min(original.length, typed.length); i++) {
                if (original.charAt(i) === typed.charAt(i)) {
                    correctCharacters++;
                }
            }

            return ((correctCharacters / original.length) * 100).toFixed(2);
        }
    </script>
</body>
</html>
